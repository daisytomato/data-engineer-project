name: Daily Job Digest

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r My_job_search_daily/job-pipeline/requirements.txt

      - name: Run job pipeline
        env:
          RAPIDAPI_KEY:                ${{ secrets.RAPIDAPI_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          GMAIL_USER:                  ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:              ${{ secrets.GMAIL_APP_PASS }}
          NOTIFY_EMAIL:                ${{ secrets.NOTIFY_EMAIL }}
        run: python My_job_search_daily/job-pipeline/run_pipeline.py

      - name: Upload jobs artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-json-${{ github.run_id }}
          path: My_job_search_daily/job-pipeline/jobs.json
          retention-days: 7
